<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 Carrera del Conocimiento</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Confetti canvas for victory -->
    <canvas id="confetti-canvas"></canvas>

    <div id="app-container">

        <!-- ========== LOBBY SCREEN ========== -->
        <div id="lobby-screen" class="screen active">
            <div class="lobby-bg"></div>
            <div class="lobby-content">
                <div class="lobby-logo">🚀</div>
                <h1 class="glitch-title" data-text="CARRERA DEL CONOCIMIENTO">CARRERA DEL CONOCIMIENTO</h1>
                <h2 class="subtitle">⚡ ¡Aprende Compitiendo! ⚡</h2>
                <div class="menu-options">
                    <label class="level-label">📚 Asignatura</label>
                    <select id="subject-selector" class="huge-input level-select" title="Selecciona la asignatura">
                        <option value="matematicas" selected>🔢 Matemáticas</option>
                        <option value="lenguaje">📖 Lenguaje</option>
                        <option value="ciencias">🔬 Ciencias Naturales</option>
                        <option value="historia">🌍 Historia y Geografía</option>
                        <option value="ingles">🇬🇧 Inglés</option>
                    </select>
                    <label class="level-label">📚 Nivel Educativo</label>
                    <select id="level-selector" class="huge-input level-select">
                        <option value="1-2">🟢 1° a 2° Básico</option>
                        <option value="3-4" selected>🔵 3° a 4° Básico</option>
                        <option value="5-6">🟣 5° a 6° Básico</option>
                        <option value="7-8">🔴 7° a 8° Básico</option>
                    </select>
                    <div class="menu-divider"></div>
                    <button class="btn btn-primary pulse-btn" onclick="initHostMode(false)">🖥️ Pantalla Principal
                        (Relevos)</button>
                    <button class="btn btn-primary pulse-btn" onclick="initHostMode(true)">⚔️ Pantalla Principal (1 vs
                        1)</button>
                    <div class="menu-divider"></div>
                    <button class="btn btn-secondary" onclick="initBuzzerMode()">📱 Conectar como Equipo</button>
                </div>
            </div>
        </div>

        <!-- ========== HOST SCREEN (PROJECTOR VIEW) ========== -->
        <div id="host-screen" class="screen">
            <!-- Animated space/tropical background layers -->
            <div class="host-bg">
                <div class="bg-sky"></div>
                <div class="bg-stars"></div>
                <div class="bg-nebula"></div>
                <div class="bg-planet planet-1"></div>
                <div class="bg-planet planet-2"></div>
                <div class="bg-shooting-star"></div>
                <div class="bg-clouds"></div>
                <div class="bg-mountains"></div>
                <div class="bg-ground"></div>
                <!-- Multiple palm trees -->
                <div class="palm" style="left:3%; bottom:14%; font-size:4.5rem; opacity:0.7;">🌴</div>
                <div class="palm" style="left:12%; bottom:13%; font-size:6rem; opacity:0.9;">🌴</div>
                <div class="palm" style="left:22%; bottom:14%; font-size:3.5rem; opacity:0.5;">🌴</div>
                <div class="palm" style="left:38%; bottom:13%; font-size:5rem; opacity:0.6;">🌴</div>
                <div class="palm" style="left:55%; bottom:14%; font-size:4rem; opacity:0.5;">🌴</div>
                <div class="palm" style="left:68%; bottom:13%; font-size:6.5rem; opacity:0.8;">🌴</div>
                <div class="palm" style="left:78%; bottom:14%; font-size:3rem; opacity:0.4;">🌴</div>
                <div class="palm" style="left:88%; bottom:13%; font-size:5.5rem; opacity:0.7;">🌴</div>
                <div class="palm" style="left:95%; bottom:14%; font-size:4rem; opacity:0.5;">🌴</div>
            </div>

            <!-- Top bar -->
            <div class="top-bar">
                <div class="room-info">
                    <span class="room-label">CÓDIGO:</span>
                    <span id="display-room-code" class="room-code-value">----</span>
                </div>
                <div class="connection-info">
                    <span class="conn-icon">📡</span> <span id="connected-count">0</span>
                    <button class="exit-btn" onclick="goLobby()">✕</button>
                </div>
            </div>

            <!-- RACE AREA -->
            <div class="race-area" id="lanes-container">
                <!-- Tracks will be injected dynamically -->
            </div>

            <!-- Waiting message -->
            <div id="waiting-msg" class="waiting-msg">
                <div class="waiting-pulse"></div>
                Esperando que los equipos se conecten con el código de arriba...
            </div>

            <!-- Victory overlay -->
            <div id="victory-overlay" class="hidden">
                <div class="victory-content">
                    <div class="trophy-row">🏆🏆🏆</div>
                    <h1 id="victory-text" class="victory-title">¡VICTORIA!</h1>
                    <p id="victory-team" class="victory-sub"></p>
                    <div id="post-race-summary" class="hidden"></div>
                    <button class="btn btn-primary btn-big pulse-btn" onclick="goLobby()">🔄 REVANCHA</button>
                </div>
            </div>
            <!-- Host epic notifications -->
            <div id="host-notifications"></div>
        </div>

        <!-- ========== BUZZER SCREEN (MOBILE) ========== -->
        <div id="buzzer-screen" class="screen">
            <div id="join-section">
                <div class="join-card">
                    <div class="join-icon">🎮</div>
                    <h2>Unirse a la Carrera</h2>
                    <input type="text" id="input-room-code" class="huge-input" placeholder="CÓDIGO" maxlength="4"
                        style="text-transform:uppercase" autocomplete="off">
                    <input type="text" id="team-selector" class="huge-input" placeholder="Tu Nombre (Ej: Juan)" maxlength="12" autocomplete="off" style="text-align: center; margin-top: 10px;">
                    <button class="btn btn-primary" onclick="joinRoom()">🔗 Conectar</button>
                    <button class="btn btn-danger btn-small" onclick="goLobby()">Cancelar</button>
                </div>
            </div>

            <div id="gameplay-section" class="hidden">
                <div class="team-header" id="buzzer-team-name">EQUIPO X</div>
                <!-- Countdown timer bar -->
                <div id="countdown-container" class="countdown-container hidden">
                    <div id="countdown-bar" class="countdown-fill"></div>
                </div>
                <div id="countdown-urgent" class="countdown-urgent-display hidden">⏱️ <span
                        id="countdown-number">10</span></div>
                <div class="buzzer-question" id="buzzer-question-display">Preparado...</div>

                <!-- ANSWER BAR: INPUT + ENVIAR — ALWAYS VISIBLE -->
                <div class="answer-bar">
                    <input type="text" id="answer-input" class="answer-field" readonly placeholder="?" inputmode="none">
                    <button class="send-btn" onclick="submitAnswer()">ENVIAR ➤</button>
                </div>

                <!-- NUMPAD (for numeric answers) -->
                <div id="numpad-container" class="numpad-grid">
                    <button class="num-key" onclick="appendNum(1)">1</button>
                    <button class="num-key" onclick="appendNum(2)">2</button>
                    <button class="num-key" onclick="appendNum(3)">3</button>
                    <button class="num-key" onclick="appendNum(4)">4</button>
                    <button class="num-key" onclick="appendNum(5)">5</button>
                    <button class="num-key" onclick="appendNum(6)">6</button>
                    <button class="num-key" onclick="appendNum(7)">7</button>
                    <button class="num-key" onclick="appendNum(8)">8</button>
                    <button class="num-key" onclick="appendNum(9)">9</button>
                    <button class="num-key key-clear" onclick="clearNum()">⌫</button>
                    <button class="num-key key-zero" onclick="appendNum(0)">0</button>
                    <button class="num-key key-neg" onclick="appendNeg()">−</button>
                </div>

                <!-- MULTIPLE CHOICE (for non-numeric answers) -->
                <div id="options-container" class="options-grid hidden">
                    <button class="option-btn" onclick="submitOption(1)"><span class="option-num">1</span><span
                            id="opt-text-1" class="option-text"></span></button>
                    <button class="option-btn" onclick="submitOption(2)"><span class="option-num">2</span><span
                            id="opt-text-2" class="option-text"></span></button>
                    <button class="option-btn" onclick="submitOption(3)"><span class="option-num">3</span><span
                            id="opt-text-3" class="option-text"></span></button>
                    <button class="option-btn" onclick="submitOption(4)"><span class="option-num">4</span><span
                            id="opt-text-4" class="option-text"></span></button>
                </div>

                <!-- Freeze overlay -->
                <div id="freeze-overlay" class="freeze-overlay hidden">
                    <div class="freeze-icon">❌</div>
                    <h2>¡INCORRECTO!</h2>
                    <div class="freeze-timer" id="freeze-timer">3</div>
                </div>
                <!-- Correct flash -->
                <div id="correct-flash" class="correct-flash hidden">
                    <div class="correct-icon">✅</div>
                    <h2>¡CORRECTO!</h2>
                </div>
                <!-- Timeout overlay -->
                <div id="timeout-overlay" class="timeout-overlay hidden">
                    <div class="timeout-icon">⚠️</div>
                    <h2>¡TIEMPO AGOTADO!</h2>
                    <div class="timeout-text">¡CAMBIO DE TURNO!</div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="gas_connector.js"></script>
    <script src="questions/matematicas.js"></script>
    <script src="questions/lenguaje.js"></script>
    <script src="questions/ciencias.js"></script>
    <script src="questions/historia.js"></script>
    <script src="questions/ingles.js"></script>
    <script src="app.js"></script>
</body>

</html>
